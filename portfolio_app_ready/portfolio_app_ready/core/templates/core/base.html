<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Optimizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #09090b;
            --bg-2:     #0f0f12;
            --bg-3:     #141418;
            --bg-4:     #18181d;
            --border:   rgba(255,255,255,0.06);
            --border-md: rgba(255,255,255,0.10);
            --text-1:   #f1f1f3;
            --text-2:   #a0a0ab;
            --text-3:   #60606e;
            --green:    #4ade80;
            --green-dim: rgba(74,222,128,0.10);
            --red:      #f87171;
            --red-dim:  rgba(248,113,113,0.10);
            --blue:     #60a5fa;
            --blue-dim: rgba(96,165,250,0.10);
            --amber:    #fbbf24;
            --amber-dim: rgba(251,191,36,0.10);
            --radius:   8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', -apple-system, sans-serif;
            --sidebar-w: 256px;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text-1);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            animation: pageFade 0.35s ease;
        }

        @keyframes pageFade {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Sidebar ──────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            position: fixed; left: 0; top: 0;
            background: var(--bg-2);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 20px 16px;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 8px; margin-bottom: 28px;
        }
        .sidebar-logo-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--blue);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 14px; font-weight: 500;
            color: var(--bg);
        }
        .sidebar-logo-name {
            font-size: 14px; font-weight: 600; color: var(--text-1);
            letter-spacing: -0.02em;
        }
        .sidebar-logo-sub {
            font-size: 11px; color: var(--text-3); font-family: var(--mono);
        }

        /* Balance widget */
        .sidebar-balance {
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            margin-bottom: 24px;
        }
        .sidebar-balance-label {
            font-size: 11px; color: var(--text-3);
            font-family: var(--mono); text-transform: uppercase;
            letter-spacing: 0.06em; margin-bottom: 6px;
        }
        .sidebar-balance-value {
            font-size: 22px; font-weight: 600;
            color: var(--text-1); letter-spacing: -0.03em;
            font-family: var(--mono);
        }
        .sidebar-balance-ret {
            margin-top: 6px; font-size: 12px;
            color: var(--green); font-family: var(--mono);
        }

        /* Nav */
        .sidebar-section-label {
            font-size: 10px; color: var(--text-3);
            font-family: var(--mono); text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0 8px; margin-bottom: 6px;
        }
        .nav-group { margin-bottom: 20px; }
        .menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 10px;
            border-radius: var(--radius);
            color: var(--text-2);
            text-decoration: none;
            font-size: 13px; font-weight: 500;
            transition: all 0.15s;
            margin-bottom: 2px;
        }
        .menu-item:hover {
            background: var(--bg-3);
            color: var(--text-1);
        }
        .menu-item.active-menu {
            background: var(--bg-4);
            color: var(--text-1);
            border: 1px solid var(--border-md);
        }
        .menu-item .nav-icon {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; opacity: 0.7;
        }

        /* User at bottom */
        .sidebar-user {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--bg-4);
            border: 1px solid var(--border-md);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 12px; font-weight: 500;
            color: var(--text-2);
            flex-shrink: 0;
        }
        .user-name { font-size: 13px; font-weight: 500; color: var(--text-1); }
        .user-role { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

        /* ── Main content ─────────────────────── */
        .content {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
        }

        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(9,9,11,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; height: 52px;
        }

        .topbar-search {
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 14px;
            color: var(--text-1);
            font-family: var(--sans); font-size: 13px;
            width: 280px;
            transition: border-color 0.15s;
        }
        .topbar-search::placeholder { color: var(--text-3); }
        .topbar-search:focus { outline: none; border-color: var(--border-md); }

        .topbar-right {
            display: flex; align-items: center; gap: 12px;
        }
        .topbar-user {
            display: flex; align-items: center; gap: 8px;
        }
        .topbar-user-name { font-size: 13px; color: var(--text-2); }
        .topbar-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--bg-4);
            border: 1px solid var(--border-md);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 11px; color: var(--text-2);
        }

        .page-body { padding: 28px; }

        /* ── Shared components ────────────────── */
        .page-header { margin-bottom: 28px; }
        .page-title {
            font-size: 20px; font-weight: 600;
            color: var(--text-1); letter-spacing: -0.025em;
        }
        .page-subtitle { font-size: 13px; color: var(--text-3); margin-top: 4px; }

        .section-label {
            font-family: var(--mono); font-size: 10px;
            color: var(--text-3); text-transform: uppercase;
            letter-spacing: 0.08em; margin-bottom: 12px;
        }

        /* Cards */
        .card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 20px 22px;
        }
        .card + .card { margin-top: 16px; }

        /* Stat cards grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 18px;
            transition: border-color 0.15s;
        }
        .stat-card:hover { border-color: var(--border-md); }
        .stat-label {
            font-size: 11px; color: var(--text-3);
            font-family: var(--mono); text-transform: uppercase;
            letter-spacing: 0.06em; margin-bottom: 8px;
        }
        .stat-value {
            font-size: 26px; font-weight: 600;
            color: var(--text-1); letter-spacing: -0.035em;
            font-family: var(--mono);
        }
        .stat-meta { font-size: 11px; color: var(--text-3); margin-top: 6px; }

        .green { color: var(--green); }
        .red   { color: var(--red); }
        .blue  { color: var(--blue); }
        .amber { color: var(--amber); }

        /* Table */
        .table-wrap {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .table-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
        }
        .table-head-title {
            font-size: 14px; font-weight: 600; color: var(--text-1);
        }
        table { width: 100%; border-collapse: collapse; }
        table th {
            text-align: left;
            padding: 11px 22px;
            font-size: 11px; font-weight: 500;
            color: var(--text-3);
            font-family: var(--mono);
            text-transform: uppercase; letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
            background: var(--bg-3);
        }
        table td {
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            font-size: 13px; color: var(--text-1);
        }
        table tbody tr:last-child td { border-bottom: none; }
        table tbody tr { transition: background 0.1s; }
        table tbody tr:hover { background: var(--bg-3); }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 500;
            font-family: var(--mono);
        }
        .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
        .badge-red   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
        .badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
        .badge-blue  { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(96,165,250,0.2); }

        /* Ticker link */
        .ticker-link {
            font-family: var(--mono); font-size: 12px;
            color: var(--blue); text-decoration: none;
            padding: 2px 7px;
            background: var(--blue-dim);
            border-radius: 4px;
            border: 1px solid rgba(96,165,250,0.15);
            transition: border-color 0.15s;
        }
        .ticker-link:hover { border-color: var(--blue); color: var(--blue); }

        /* Buttons */
        .btn-primary {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--text-1); color: var(--bg);
            border: none; border-radius: var(--radius);
            padding: 8px 16px; font-size: 13px; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: all 0.15s;
        }
        .btn-primary:hover { background: #d4d4d8; }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 6px;
            background: transparent; color: var(--text-2);
            border: 1px solid var(--border-md); border-radius: var(--radius);
            padding: 8px 16px; font-size: 13px; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: all 0.15s;
        }
        .btn-ghost:hover { color: var(--text-1); border-color: var(--text-3); }
        .btn-danger {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--red-dim); color: var(--red);
            border: 1px solid rgba(248,113,113,0.25); border-radius: var(--radius);
            padding: 8px 16px; font-size: 13px; font-weight: 500;
            cursor: pointer; text-decoration: none;
            transition: all 0.15s;
        }
        .btn-danger:hover { background: rgba(248,113,113,0.2); }
        .btn-sm { padding: 5px 10px; font-size: 11px; }

        /* AI box */
        .ai-box {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 20px 22px;
            margin-top: 16px;
        }
        .ai-box-title {
            font-size: 13px; font-weight: 600; color: var(--text-1);
            margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .ai-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .ai-item {
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            font-size: 13px; color: var(--text-2);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .ai-item:last-child { margin-bottom: 0; }

        /* Progress bar */
        .progress-track {
            height: 4px; background: var(--bg-4);
            border-radius: 2px; overflow: hidden;
            margin-bottom: 6px;
        }
        .progress-fill {
            height: 100%; border-radius: 2px;
            background: var(--blue);
            width: var(--progress-width, 0%);
            transition: width 0.6s ease;
        }

        /* Form fields */
        .form-label {
            display: block; font-size: 12px;
            color: var(--text-3); font-family: var(--mono);
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        input[type=text], input[type=number], select, textarea {
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-1);
            font-family: var(--sans); font-size: 13px;
            padding: 9px 12px;
            width: 100%;
            transition: border-color 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--border-md);
        }
        input::placeholder { color: var(--text-3); }
        select option { background: var(--bg-3); }

        /* Chart card */
        .chart-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 20px 22px;
            margin-bottom: 16px;
        }
        .chart-card-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 20px;
        }
        .chart-card-title {
            font-size: 14px; font-weight: 600; color: var(--text-1);
        }
        .chart-card-sub {
            font-size: 12px; color: var(--text-3); margin-top: 3px;
        }

        /* Heatmap */
        .heatmap-grid {
            display: grid;
            gap: 4px;
            overflow-x: auto;
        }
        .heatmap-cell {
            padding: 10px 8px;
            border-radius: 6px;
            text-align: center;
            font-family: var(--mono);
            font-size: 11px; font-weight: 500;
            min-width: 64px;
        }
        .heatmap-label {
            padding: 10px 8px;
            font-family: var(--mono);
            font-size: 11px; color: var(--text-3);
            min-width: 64px;
        }

        /* Period buttons */
        .period-btn {
            background: var(--bg-3);
            color: var(--text-3);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: var(--radius);
            font-family: var(--mono); font-size: 11px;
            cursor: pointer; transition: all 0.15s;
        }
        .period-btn:hover, .period-btn.active {
            background: var(--bg-4);
            color: var(--text-1);
            border-color: var(--border-md);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">P</div>
        <div>
            <div class="sidebar-logo-name">Portfolio AI</div>
            <div class="sidebar-logo-sub">optimizer</div>
        </div>
    </div>

    <div class="sidebar-balance">
        <div class="sidebar-balance-label">Общий баланс</div>
        <div class="sidebar-balance-value">{{ sidebar_total_amount }} $</div>
        <div class="sidebar-balance-ret">↑ +{{ sidebar_portfolio_return }}%</div>
    </div>

    <div class="nav-group">
        <div class="sidebar-section-label">Навигация</div>
        <a href="{% url 'dashboard' %}" class="menu-item {% if request.path == '/' %}active-menu{% endif %}">
            <span class="nav-icon">◫</span> Дашборд
        </a>
        <a href="{% url 'asset_create' %}" class="menu-item {% if '/assets/add/' in request.path %}active-menu{% endif %}">
            <span class="nav-icon">+</span> Добавить актив
        </a>
        <a href="{% url 'optimizer' %}" class="menu-item {% if '/optimizer/' in request.path %}active-menu{% endif %}">
            <span class="nav-icon">⌀</span> Оптимизация
        </a>
        <a href="{% url 'risks' %}" class="menu-item {% if '/risks/' in request.path %}active-menu{% endif %}">
            <span class="nav-icon">△</span> Анализ рисков
        </a>
        <a href="{% url 'model_docs' %}" class="menu-item {% if '/models-docs/' in request.path %}active-menu{% endif %}">
            <span class="nav-icon">≡</span> Документация
        </a>
    </div>

    <div class="nav-group">
        <div class="sidebar-section-label">Система</div>
        <a href="{% url 'logout' %}" class="menu-item">
            <span class="nav-icon">←</span> Выход
        </a>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar">P</div>
        <div>
            <div class="user-name">Portfolio Manager</div>
            <div class="user-role">investor</div>
        </div>
    </div>
</div>

<div class="content">
    <div class="topbar">
        <input type="text" class="topbar-search" placeholder="Поиск тикеров, активов, ETF…">
        <div class="topbar-right">
            <div class="topbar-user">
                <span class="topbar-user-name">Инвестор</span>
                <div class="topbar-avatar">P</div>
            </div>
        </div>
    </div>

    <div class="page-body">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
